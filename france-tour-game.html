function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a;
}

}

function playSound(ok) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(ok){ o.frequency.setValueAtTime(660,ctx.currentTime); o.frequency.setValueAtTime(880,ctx.currentTime+0.1); }
    else  { o.frequency.setValueAtTime(300,ctx.currentTime); o.frequency.setValueAtTime(200,ctx.currentTime+0.12); }
    g.gain.setValueAtTime(0.22,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    o.start(); o.stop(ctx.currentTime+0.35);
  } catch(_){}
}

  }, 50);
}

async function handleAuth(mode) {
  const username = document.getElementById('auth-username')?.value.trim();
  const password = document.getElementById('auth-password')?.value;
  const errEl    = document.getElementById('auth-error');

  const showErr = (msg) => { errEl.textContent = msg; errEl.classList.remove('hidden'); };
  errEl.classList.add('hidden');

  if (!username || username.length < 3) return showErr('ユーザーネームは3文字以上で入力してください');
  if (!password || password.length < 6) return showErr('パスワードは6文字以上で入力してください');

  if (mode === 'signup') {
    const pw2 = document.getElementById('auth-password2')?.value;
    if (password !== pw2) return showErr('パスワードが一致しません');
  }

  // ボタンをローディング状態に
  const btn = app.querySelector('button[onclick*="handleAuth"]');
  if (btn) { btn.textContent = '処理中...'; btn.disabled = true; }

  try {
    if (mode === 'signup') {
      await signUp(username, password);
      // 登録後すぐログイン
      const { data, error } = await sb.auth.signInWithPassword({
        email: username.toLowerCase() + '@french-adventure.app', password
      });
      if (error) throw error;
      if (!data?.user) throw new Error('登録は完了しましたが、ログインに失敗しました。ログイン画面から入り直してください。');
      currentUser = data.user;
    } else {
      const { data, error } = await signIn(username, password);
      if (error) throw error;
      if (!data?.user) throw new Error('ログインに失敗しました');
      currentUser = data.user;
    }
    const { data: profile } = await sb.from('profiles').select('username, is_premium').eq('id', currentUser.id).single();
    currentProfile = profile;
    if (profile?.is_premium) gs.isPremium = true;
    await loadProgressFromDB();
    show('top');
  } catch(e) {
    let msg = e.message || 'エラーが発生しました';
    if (msg.includes('Invalid login') || msg.includes('invalid_credentials')) msg = 'ユーザーネームまたはパスワードが間違っています';
    if (msg.includes('already registered')) msg = 'このユーザーネームはすでに使われています';
    if (msg.includes('Password should')) msg = 'パスワードは6文字以上にしてください';
    if (msg.includes('Email signups are disabled')) msg = 'サインアップが無効になっています（Supabase設定を確認）';
    showErr(msg);
    if (btn) { btn.textContent = mode==='login'?'ログイン →':'アカウント作成 →'; btn.disabled = false; }
  }
}

function startQuiz(cityId) {
  const city = CITIES.find(c=>c.id===cityId);
  const pool = wordsForCity(city.name);
  // Prioritise unseen words, then shuffle
  const unseen = pool.filter(w => !gs.masteredWords[w.id]);
  const seen   = pool.filter(w =>  gs.masteredWords[w.id]);
  const ordered = [...shuffle(unseen), ...shuffle(seen)];
  const words = ordered.slice(0, Math.min(20, ordered.length));
  qs = { cityId, city, words, idx:0, correct:0, answered:false, choices:[], selected:null };
  qs.choices = makeChoices(words[0]);
  renderQuiz();
}

function answerQ(i) {
  if (qs.answered) return;
  qs.answered = true; qs.selected = i;
  const ok = qs.choices[i] === qs.words[qs.idx].answer;
  if (ok) {
    qs.correct++;
    gs.masteredWords[qs.words[qs.idx].id] = true;
  }
  playSound(ok);
  renderQuiz();
}

function nextQ() {
  qs.idx++;
  if (qs.idx >= qs.words.length) { finishQuiz(); return; }
  qs.answered = false; qs.selected = null;
  qs.choices = makeChoices(qs.words[qs.idx]);
  renderQuiz();
}

function finishQuiz() {
  const accuracy = Math.round((qs.correct/qs.words.length)*100);
  const pts = qs.correct * 10;
  if (accuracy >= 80 && !gs.clearedCities.includes(qs.cityId)) gs.clearedCities.push(qs.cityId);
  if (gs.bestAccuracies[qs.cityId]===undefined || accuracy>gs.bestAccuracies[qs.cityId])
    gs.bestAccuracies[qs.cityId] = accuracy;
  gs.totalPoints += pts;
  if (!gs.totalQuizzes) gs.totalQuizzes = 0;
  gs.totalQuizzes++;
  if (!gs.quizHistory) gs.quizHistory = [];
  gs.quizHistory.unshift({ cityId:qs.cityId, accuracy, pts, date:new Date().toLocaleDateString('en-US') });
  if (gs.quizHistory.length > 50) gs.quizHistory = gs.quizHistory.slice(0,50);
  saveState();
  saveProgressToDB(); // Supabaseに非同期保存
  renderResult();
}

function renderQuiz() {
  const {words,idx,correct,answered,choices,selected,city} = qs;
  const total = words.length;
  const w = words[idx];
  const pct = Math.round(idx/total*100);

    else if (c===w.answer) cls+='correct';
    else if (i===selected) cls+='incorrect';
    else cls+='bg-gray-100 border-gray-200 text-gray-400';
    return `<button class="${cls}" ${answered?'disabled':''} onclick="answerQ(${i})">${c}</button>`;

            <span class="font-bold">${city.emoji} ${city.name} — ${city.level}</span>

          </div>

            </div>
            <span class="text-xs text-blue-200 shrink-0">${idx+1}/${total}</span>
          </div>
          ${idx>0?`<p class="text-center text-xs text-blue-300">Accuracy: <b class="text-white">${acc}%</b> ${acc>=80?'✅':acc>=60?'⚠️':'❌'}</p>`:''}
        </div>

  const {words,correct,city} = qs;
  const accuracy = Math.round(correct/words.length*100);
  const btn = document.querySelector('#rankForm button');
  if (btn) { btn.textContent = '送信中...'; btn.disabled = true; }
  try {
    if (currentUser) {
      await submitRankingToDB(nick, accuracy, gs.totalPoints, city);
    } else {
      // ゲストはlocalStorageのみ
      if (!gs.rankings) gs.rankings=[];
      gs.rankings = [{
        nickname:nick, points:gs.totalPoints, accuracy,
        city:city.name, level:city.level, mastered:totalMastered(),
        date:new Date().toLocaleDateString('en-US')
      }, ...gs.rankings].slice(0,100);
      saveState();
    }
    document.getElementById('rankForm').innerHTML=`<p class="text-center text-green-300 font-black">✓ 登録完了！ ${nick} さん、お疲れ様！ 🎉</p>`;
  } catch(e) {
    document.getElementById('rankForm').innerHTML=`<p class="text-center text-red-300 font-black">エラー: ${e.message}</p>`;
  }
}

// ============================================================
//  DASHBOARD SCREEN
// ============================================================
function renderDashboard() {
  const mastered  = totalMastered();
  const total     = WORD_DATA.length;
  const pct       = Math.round(mastered/total*100);
  const days      = (gs.daysActive||[]).length;
  const quizDone  = gs.totalQuizzes || 0;
  const cleared   = gs.clearedCities.length;

  // Per-level stats
  const levels = ["A1","A2","B1","B2"];
  const levelStats = levels.map(lv => {
    const lvWords = WORD_DATA.filter(w=>w.level===lv);
    const lvMastered = lvWords.filter(w=>gs.masteredWords[w.id]).length;
    const lvCities = CITIES.filter(c=>c.level===lv);
    const lvCleared = lvCities.filter(c=>gs.clearedCities.includes(c.id)).length;
    return { lv, total:lvWords.length, mastered:lvMastered, cities:lvCities.length, cleared:lvCleared };
  });

  const levelColors = {A1:'#3b82f6',A2:'#06b6d4',B1:'#f43f5e',B2:'#9333ea'};

  const levelCards = levelStats.map(s=>`
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <div class="flex justify-between items-center mb-2">
        <span class="font-black text-gray-800">${s.lv}</span>
        <span class="text-xs text-gray-500">${s.cleared}/${s.cities} cities cleared</span>
      </div>
      <div class="stat-bar mb-1">
        <div class="stat-bar-fill" style="width:${s.total>0?Math.round(s.mastered/s.total*100):0}%;background:${levelColors[s.lv]}"></div>
      </div>
      <p class="text-xs text-gray-500">${s.mastered} / ${s.total} words mastered</p>
    </div>`).join('');

  // Recent quiz history
  const history = (gs.quizHistory||[]).slice(0,10);
  const histRows = history.length===0
    ? `<p class="text-gray-400 text-center py-4 text-sm">No quizzes yet!</p>`
    : history.map(h=>{
        const city = CITIES.find(c=>c.id===h.cityId);
        return `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
          <div class="flex items-center gap-2">
            <span>${city?city.emoji:'🏙️'}</span>
            <div><p class="text-sm font-semibold text-gray-800">${city?city.name:h.cityId}</p><p class="text-xs text-gray-400">${h.date}</p></div>
          </div>
          <div class="text-right">
            <span class="font-black text-sm" style="color:${accuracyColor(h.accuracy)}">${h.accuracy}%</span>
            <p class="text-xs text-gray-400">+${h.pts} pts</p>
          </div>
        </div>`;
      }).join('');

  // Category breakdown
  const cats = {};
  WORD_DATA.forEach(w=>{ if(!cats[w.category]) cats[w.category]={total:0,mastered:0}; cats[w.category].total++; if(gs.masteredWords[w.id]) cats[w.category].mastered++; });
  const topCats = Object.entries(cats).sort((a,b)=>b[1].mastered-a[1].mastered).slice(0,6);
  const catBars = topCats.map(([cat,s])=>`
    <div class="mb-3">
      <div class="flex justify-between text-xs mb-1"><span class="text-gray-700 capitalize">${cat}</span><span class="text-gray-500">${s.mastered}/${s.total}</span></div>
      <div class="stat-bar">
        <div class="stat-bar-fill bg-blue-500" style="width:${s.total>0?Math.round(s.mastered/s.total*100):0}%"></div>
      </div>
    </div>`).join('');

  // City accuracy chart
  const cityBars = CITIES.filter(c=>gs.bestAccuracies[c.id]!==undefined).map(c=>`
    <div class="mb-2">
      <div class="flex justify-between text-xs mb-0.5">
        <span>${c.emoji} ${c.name}</span>
        <span style="color:${accuracyColor(gs.bestAccuracies[c.id])}">${gs.bestAccuracies[c.id]}%</span>
      </div>
      <div class="stat-bar">
        <div class="stat-bar-fill" style="width:${gs.bestAccuracies[c.id]}%;background:${accuracyColor(gs.bestAccuracies[c.id])}"></div>
      </div>
    </div>`).join('') || '<p class="text-gray-400 text-sm">Play a quiz to see your accuracy!</p>';

  app.innerHTML = `
    <div class="min-h-screen bg-gray-100">
      <div class="sticky top-0 z-10 bg-gradient-to-r from-blue-900 to-blue-700 text-white px-4 py-3 shadow">
        <div class="max-w-lg mx-auto flex items-center justify-between">
          <button onclick="show('map')" class="text-blue-300 hover:text-white text-sm">← Map</button>
          <span class="font-black text-lg">📊 My Dashboard</span>
          <span class="text-yellow-300 font-bold text-sm">${gs.totalPoints} pts</span>
        </div>
      </div>

      <div class="max-w-lg mx-auto p-4 space-y-4">

        <!-- Top stats -->
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
            <div class="text-4xl font-black text-yellow-500">${gs.totalPoints}</div>
            <div class="text-xs text-gray-500 mt-0.5">Total Points</div>
          </div>
          <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
            <div class="text-4xl font-black text-green-600">${mastered}</div>
            <div class="text-xs text-gray-500 mt-0.5">Words Mastered</div>
          </div>
          <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
            <div class="text-4xl font-black text-blue-600">${cleared}<span class="text-gray-400 text-xl">/12</span></div>
            <div class="text-xs text-gray-500 mt-0.5">Cities Cleared</div>
          </div>
          <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
            <div class="text-4xl font-black text-purple-600">${days}</div>
            <div class="text-xs text-gray-500 mt-0.5">Days Active</div>
          </div>
        </div>

        <!-- Overall progress -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex justify-between items-center mb-2">
            <h3 class="font-black text-gray-800">Overall Progress</h3>
            <span class="font-black text-blue-600">${pct}%</span>
          </div>
          <div class="stat-bar mb-1" style="height:14px">
            <div class="stat-bar-fill bg-gradient-to-r from-blue-500 to-purple-600" style="width:${pct}%;height:14px;border-radius:7px"></div>
          </div>
          <p class="text-xs text-gray-500">${mastered} / ${total} words across all levels</p>
        </div>

        <!-- By level -->
        <div>
          <h3 class="font-black text-gray-700 mb-2 text-sm px-1">Progress by Level</h3>
          <div class="grid grid-cols-2 gap-3">${levelCards}</div>
        </div>

        <!-- City accuracy -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-black text-gray-800 mb-3">Best Accuracy by City</h3>
          ${cityBars}
        </div>

        <!-- Category breakdown -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-black text-gray-800 mb-3">Top Categories Mastered</h3>
          ${catBars}
        </div>

        <!-- Recent history -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-black text-gray-800 mb-2">Recent Quizzes</h3>
          ${histRows}
        </div>

        <!-- Quick stats -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-black text-gray-800 mb-2">Stats</h3>
          <div class="space-y-1 text-sm text-gray-600">
            <div class="flex justify-between"><span>Quizzes completed</span><span class="font-bold">${quizDone}</span></div>
            <div class="flex justify-between"><span>Unique words seen</span><span class="font-bold">${mastered}</span></div>
            <div class="flex justify-between"><span>Cities explored</span><span class="font-bold">${Object.keys(gs.bestAccuracies||{}).length}/12</span></div>
            <div class="flex justify-between"><span>Days learning</span><span class="font-bold">${days}</span></div>
          </div>
        </div>

        <button onclick="show('map')" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 transition-all">🗺️ Back to Map</button>
        <p class="text-center text-gray-400 text-xs pb-4">Progress saved automatically in your browser</p>
      </div>
    </div>`;
}

// ============================================================
//  MAP VIEW (Leaflet real map)
// ============================================================
function renderMapView() {
  app.innerHTML = `
    <div class="min-h-screen flex flex-col" style="background:#0f172a">
      <!-- Header -->
      <div class="bg-gradient-to-r from-blue-900 to-blue-700 text-white px-4 py-3 shadow z-20 relative">
        <div class="max-w-lg mx-auto flex items-center justify-between">
          <button onclick="show('map')" class="text-blue-300 hover:text-white text-sm">← List View</button>
          <span class="font-black text-lg">🗺️ France — Adventure Map</span>
          <span class="text-yellow-300 font-bold text-sm">${gs.totalPoints} pts</span>
        </div>
      </div>

      <!-- Legend -->
      <div class="bg-white/95 backdrop-blur px-4 py-2 flex items-center gap-4 text-xs font-semibold z-10 shadow-sm flex-wrap">
        <span class="text-gray-500">Legend:</span>
        <span class="flex items-center gap-1"><span style="background:#f59e0b;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> Cleared ✓</span>
        <span class="flex items-center gap-1"><span style="background:#3b82f6;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> A1 Unlocked</span>
        <span class="flex items-center gap-1"><span style="background:#06b6d4;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> A2 Unlocked</span>
        <span class="flex items-center gap-1"><span style="background:#f43f5e;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> B1 Unlocked</span>
        <span class="flex items-center gap-1"><span style="background:#9333ea;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> B2 Unlocked</span>
        <span class="flex items-center gap-1"><span style="background:#94a3b8;width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid white"></span> 🔒 Locked</span>
      </div>

      <!-- Map container -->
      <div id="france-map" style="flex:1; min-height:0; height:calc(100vh - 108px)"></div>
    </div>`;

  // Leaflet needs a tick before the container is measured
  setTimeout(() => {
    const levelColor = { A1:'#3b82f6', A2:'#06b6d4', B1:'#f43f5e', B2:'#9333ea' };

    const map = L.map('france-map', {
      center: [46.6, 2.3],
      zoom: 6,
      zoomControl: true,
      attributionControl: true,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map);

    CITIES.forEach(city => {
      const unlocked = isCityUnlocked(city.id);
      const cleared  = gs.clearedCities.includes(city.id);
      const best     = gs.bestAccuracies[city.id];
      const cityWords = wordsForCity(city.name);
      const mastered  = cityWords.filter(w => gs.masteredWords[w.id]).length;

      // Pin color
      const pinColor = cleared ? '#f59e0b' : unlocked ? levelColor[city.level] : '#94a3b8';
      const ringColor = cleared ? '#fcd34d' : 'white';

      // Custom DivIcon
      const icon = L.divIcon({
        className: '',
        html: `
          <div class="city-pin">
            <div class="city-pin-dot" style="background:${pinColor};border-color:${ringColor}">
              <span style="font-size:16px;line-height:1">${cleared ? '⭐' : unlocked ? city.emoji : '🔒'}</span>
            </div>
            <div class="city-pin-label" style="color:${pinColor === '#94a3b8' ? '#94a3b8' : '#1e293b'}">
              ${city.name}
            </div>
          </div>`,
        iconSize: [60, 54],
        iconAnchor: [30, 18],
        popupAnchor: [0, -22],
      });

      const marker = L.marker([city.lat, city.lng], { icon }).addTo(map);

      // Popup content
      const statusBadge = cleared
        ? `<span style="background:#fef9c3;color:#92400e;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800">✓ CLEARED — Best: ${best}%</span>`
        : unlocked
        ? `<span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800">${city.level} — Unlocked</span>`
        : `<span style="background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800">🔒 Locked</span>`;

      const progressBar = cityWords.length > 0 ? `
        <div style="margin:8px 0 4px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:3px">
            <span>Words mastered</span><span>${mastered}/${cityWords.length}</span>
          </div>
          <div style="background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden">
            <div style="width:${Math.round(mastered/cityWords.length*100)}%;height:6px;background:${pinColor};border-radius:4px;transition:width 0.5s"></div>
          </div>
        </div>` : '';

      const btn = unlocked
        ? `<button onclick="show('quiz','${city.id}')"
             style="background:${pinColor};color:white;margin-top:8px">
             ${cleared ? '🔄 Play Again' : '▶ Start Quiz'}
           </button>`
        : `<button disabled style="background:#e2e8f0;color:#94a3b8;margin-top:8px;cursor:not-allowed">
             🔒 Clear ${CITIES.find(c=>c.id===city.unlockAfter)?.name || ''} first
           </button>`;

      const popup = L.popup({ maxWidth: 240, closeButton: true }).setContent(`
        <div class="map-popup">
          <div style="font-size:22px;margin-bottom:4px">${city.emoji}</div>
          <h3>${city.name}</h3>
          <p>${city.desc}</p>
          ${statusBadge}
          ${progressBar}
          ${btn}
        </div>`);

      marker.bindPopup(popup);
    });

    // Draw route line between cities (in unlock order)
    const routeCoords = CITIES.map(c => [c.lat, c.lng]);
    L.polyline(routeCoords, {
      color: '#002395',
      weight: 2,
      opacity: 0.35,
      dashArray: '6 8',
    }).addTo(map);

  }, 50);
}
