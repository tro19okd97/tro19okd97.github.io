/* ---------- DB 読み書き＆旧バージョンからの移行 ---------- */
function migrateLogs(list) {
  return list.map(l => ({ ...l, reactions: l.reactions || DEMO_REACTIONS[l.id] || {} }));
}

function migrateUsers(list) {
  const names = new Set(list.map(u => u.username));
  for (const s of seedUsers()) {
    if (!names.has(s.username)) list.push(s);
  }
  return list.map(u => ({
    comment: '',
    ...u,
    displayName: u.displayName || u.username,
    plan: u.plan || (PRESET_NAMES.includes(u.username) ? 'invited' : 'standard'),
    pos: u.pos || randLoungePoint(),
    floor: u.floor || 2,
  }));
}

function loadDB(key, seeder, migrate) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) {
      let data = JSON.parse(raw);
      if (migrate) {
        data = migrate(data);
        localStorage.setItem(key, JSON.stringify(data));
      }
      return data;
    }
  } catch (e) { /* 壊れていたら作り直す */ }
  const seeded = seeder();
  localStorage.setItem(key, JSON.stringify(seeded));
  return seeded;
}
const saveDB = (key, data) => localStorage.setItem(key, JSON.stringify(data));

/* ---------- 時間ユーティリティ ---------- */
function elapsedMs(user, now) {
  if (!user.sessionStartTime) return 0;
  let ms = now - new Date(user.sessionStartTime).getTime() - (user.totalRestMs || 0);
  if (user.status === 'resting' && user.restStartedAt) {
    ms -= now - new Date(user.restStartedAt).getTime();
  }
  return Math.max(0, ms);
}
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return (h > 0 ? String(h) + ':' : '') + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}
function fmtLogDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const diffDays = Math.floor((new Date(today.toDateString()) - new Date(d.toDateString())) / 86400000);
  const hm = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  if (diffDays === 0) return '今日 ' + hm;
  if (diffDays === 1) return '昨日 ' + hm;
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hm;
}

function AvatarSprite({ user, dispName, pos, bubble, isMe, seated, dragging, onClick, dragHandlers }) {

      {bubble && (

function OfficeScene({ users, me, bubbles, dispName, autoNight, onAvatarClick, onEnterFocus, onMoveMe, onMoveFloor }) {
  const sceneRef = useRef(null);
  const [drag, setDrag] = useState(null); // { x, y, startX, startY, moved }
  const dragRef = useRef(null);
  const setD = (v) => { dragRef.current = v; setDrag(v); };

  /* 5Fの空：時刻で自動切り替え＋手動トグル */
  const [skyOverride, setSkyOverride] = useState(null); // null=自動
  const night = skyOverride === null ? autoNight : skyOverride;

  const floor = me.floor || 2;
  const sameFloor = (u) => (u.floor || 2) === floor;
  const loungeUsers = users.filter(u => u.isOnline && sameFloor(u) && (u.status === 'lounge' || u.status === 'resting'));
  const focusUsers = users.filter(u => u.isOnline && sameFloor(u) && u.status === 'studying');

  /* エレベーターに表示する各フロアの在室人数 */
  const floorCounts = {};
  users.forEach(u => {
    if (u.isOnline && u.status !== 'offline') {
      const f = u.floor || 2;
      floorCounts[f] = (floorCounts[f] || 0) + 1;
    }
  });

  const toScenePct = (e) => {
    const r = sceneRef.current.getBoundingClientRect();
    return {
      x: Math.min(LOUNGE_BOUNDS.xMax, Math.max(LOUNGE_BOUNDS.xMin, (e.clientX - r.left) / r.width * 100)),
      y: Math.min(LOUNGE_BOUNDS.yMax, Math.max(LOUNGE_BOUNDS.yMin, (e.clientY - r.top) / r.height * 100)),
    };
  };

  /* setPointerCapture でアバター要素上でドラッグを完結させる */
  const dragHandlers = {
    onPointerDown: (e) => {
      if (me.status === 'studying') return;
      e.preventDefault();
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) { /* 合成イベント対策 */ }
      const p = toScenePct(e);
      setD({ ...p, startX: p.x, startY: p.y, moved: false });
    },
    onPointerMove: (e) => {
      const d = dragRef.current;
      if (!d) return;
      const p = toScenePct(e);
      setD({
        ...d, x: p.x, y: p.y,
        moved: d.moved || Math.abs(p.x - d.startX) > 1.2 || Math.abs(p.y - d.startY) > 1.2,
      });
    },
    onPointerUp: (e) => {
      const d = dragRef.current;
      if (!d) return;
      setD(null);
      if (d.moved) onMoveMe(d.x, d.y);
      else onAvatarClick(me, false);
    },
    onPointerCancel: () => setD(null),
  };

  const posOf = (u) => (drag && u.username === me.username)
    ? { x: drag.x, y: drag.y }
    : (u.pos || { x: 30, y: 60 });

  return (
    <div
      ref={sceneRef}
      className="relative w-full select-none overflow-hidden rounded-3xl border-4 border-amber-900/20 shadow-lg"
      style={{ aspectRatio: '16/9', minHeight: 320, background: 'linear-gradient(180deg,#fdf6e3 0%,#faeed2 100%)' }}
    >
      {/* ===== フロアごとの内装 ===== */}
      <FloorDecor floor={floor} night={night} />

      {/* ===== 集中スペース（全フロア共通） ===== */}
      <FocusZone dark={floor === 4 || (floor === 5 && night)} />

      {/* 5F：昼夜の切り替えボタン */}
      {floor === 5 && (
        <button
          onClick={() => setSkyOverride(!night)}
          title={night ? '昼の景色にする' : '夜景にする'}
          className="absolute right-2 top-2 z-30 flex h-9 w-9 items-center justify-center rounded-full border border-slate-300/60 bg-white/85 text-lg shadow-md backdrop-blur transition hover:scale-110"
        >
          {night ? '☀️' : '🌙'}
        </button>
      )}

      {/* フロア名バナー */}
      <div className="absolute left-1/2 top-1.5 z-20 -translate-x-1/2">
        <span className="rounded-full bg-black/45 px-3 py-1 text-[11px] font-bold text-white backdrop-blur">
          {FLOOR_INFO[floor].icon} {floor}F {FLOOR_INFO[floor].label}
        </span>
      </div>

      {/* ===== エレベーター（フロア移動） ===== */}
      <div className="absolute left-1.5 top-1/2 z-30 flex -translate-y-1/2 flex-col gap-1 rounded-2xl border border-slate-300/60 bg-white/90 p-1.5 shadow-lg backdrop-blur">
        <p className="text-center text-sm leading-none">🛗</p>
        {FLOOR_LIST.map(f => {
          const locked = FLOOR_INFO[f].memberOnly && me.plan !== 'invited';
          const active = floor === f;
          return (
            <button
              key={f}
              onClick={() => onMoveFloor(f)}
              title={f + 'F ' + FLOOR_INFO[f].label + (locked ? '（会員限定）' : '')}
              className={'relative w-12 rounded-lg px-1 py-1 text-[10px] font-bold transition ' +
                (active
                  ? 'bg-emerald-600 text-white shadow'
                  : locked
                    ? 'bg-slate-100 text-slate-400'
                    : 'bg-white text-slate-600 hover:bg-emerald-50')}
            >
              {f}F {locked ? '🔒' : FLOOR_INFO[f].icon}
              {(floorCounts[f] || 0) > 0 && (
                <span className={'absolute -right-1 -top-1 flex h-4 min-w-[16px] items-center justify-center rounded-full px-0.5 text-[9px] font-bold ' +
                  (active ? 'bg-white text-emerald-600' : 'bg-emerald-500 text-white')}>
                  {floorCounts[f]}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* 集中スペースへのドア */}
      {(me.status === 'lounge' || me.status === 'resting') && (
        <button
          onClick={onEnterFocus}
          className="absolute bottom-[4%] right-[33%] z-20 rounded-xl border-2 border-slate-600 bg-white/95 px-3 py-1.5 text-xs font-bold text-slate-700 shadow-md transition hover:scale-105 hover:bg-emerald-50"
        >
          🚪 {me.status === 'resting' ? '集中スペースに戻る' : '集中スペースへ'}
        </button>
      )}

      {/* ===== 集中中のメンバー（デスクに着席・話しかけ不可） ===== */}
      {focusUsers.map((u, i) => {
        const seat = FOCUS_SEATS[i % FOCUS_SEATS.length];
        return (
          <AvatarSprite
            key={u.username}
            user={u}
            dispName={dispName(u.username)}
            pos={{ x: seat.x, y: seat.y }}
            bubble={null}
            isMe={u.username === me.username}
            seated
            dragging={false}
            onClick={() => onAvatarClick(u, true)}
          />
        );
      })}

      {/* ===== ラウンジのメンバー（自分だけドラッグで移動可・自分を最前面に） ===== */}
      {[...loungeUsers.filter(u => u.username !== me.username),
        ...loungeUsers.filter(u => u.username === me.username)].map(u => {
        const isMe = u.username === me.username;
        return (
          <AvatarSprite
            key={u.username}
            user={u}
            dispName={dispName(u.username)}
            pos={posOf(u)}
            bubble={bubbles[u.username] || null}
            isMe={isMe}
            seated={false}
            dragging={isMe && drag !== null}
            onClick={isMe ? undefined : () => onAvatarClick(u, false)}
            dragHandlers={isMe ? dragHandlers : undefined}
          />
        );
      })}
    </div>
  );
}

          ) : (
            <p className="flex items-center gap-1.5 font-bold text-slate-800">

            >
              {s} <span className="text-xs font-bold text-amber-700">{who.length}</span>
            </span>
          );
        }
        const reacted = who.includes(me.username);
        return (
          <button
            key={s}
            onClick={() => onReact(log.id, s)}
            title={names}
            className={'inline-flex items-center gap-1 rounded-full border px-2.5 py-1 text-sm transition active:scale-90 ' +
              (reacted
                ? 'border-amber-400 bg-amber-100 shadow-sm'
                : 'border-slate-200 bg-white hover:border-amber-300 hover:bg-amber-50')}
          >
            {s}
            {who.length > 0 && (
              <span className={'text-xs font-bold ' + (reacted ? 'text-amber-700' : 'text-slate-500')}>{who.length}</span>
            )}
          </button>
        );
      })}
      {isMine && !hasAny && (
        <span className="text-[10px] text-slate-300">まだスタンプはありません</span>
      )}
    </div>
  );
}

function TimelineItem({ log, name, me, onReact, dispName }) {
  return (
    <div className="animate-fadeUp rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div className="mb-2 flex items-center gap-2">
        <span className="text-2xl">{log.avatar || avatarFor(log.username)}</span>
        <p className="flex-1 text-sm text-slate-700">
          <span className="font-bold">{name}</span> さんが退出しました！
        </p>
        <span className="text-xs text-slate-400">{fmtLogDate(log.date)}</span>
      </div>
      <div className="mb-2 space-y-1.5">
        <div className="flex items-start gap-2 rounded-xl bg-slate-50 px-3 py-2">
          <span className="mt-0.5 shrink-0 rounded bg-slate-200 px-1.5 py-0.5 text-[10px] font-bold text-slate-500">目標</span>
          <p className="text-sm leading-snug text-slate-500">{log.todo}</p>
        </div>
        <div className="flex justify-center text-slate-300">↓</div>
        <div className="flex items-start gap-2 rounded-xl bg-emerald-50 px-3 py-2">
          <span className="mt-0.5 shrink-0 rounded bg-emerald-200 px-1.5 py-0.5 text-[10px] font-bold text-emerald-700">結果</span>
          <p className="text-sm font-medium leading-snug text-emerald-800">{log.done}</p>
        </div>
      </div>
      <div className="flex items-center justify-between">
        <GenreBadge genre={log.genre} />
        <span className="text-xs font-bold text-slate-500">実質 {log.actualStudyTimeMinutes} 分</span>
      </div>
      <ReactionBar log={log} me={me} onReact={onReact} dispName={dispName} />
    </div>
  );
}

/* ============================================================
   ② 集中スペース画面（入室中・外の様子は見えない）
   ============================================================ */
function CheckoutModal({ me, studyMinutes, onSave, onCancel }) {
  const [done, setDone] = useState('');
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center bg-slate-900/50 p-4 backdrop-blur-sm">
      <div className="w-full max-w-md animate-fadeUp rounded-3xl bg-white p-6 shadow-2xl">
        <h3 className="mb-1 text-lg font-bold text-slate-800">🎉 おつかれさま！</h3>
        <p className="mb-4 text-sm text-slate-500">今日の結果を記録して、みんなに共有しましょう</p>

        <div className="mb-4 rounded-2xl bg-slate-50 p-4">
          <p className="mb-1 text-[11px] font-bold text-slate-400">今日の目標だったこと</p>
          <p className="mb-3 text-sm text-slate-700">{me.currentTodo}</p>
          <div className="flex items-center gap-3 text-sm">
            <GenreBadge genre={me.genre} />
            <span className="font-bold text-slate-600">実質勉強時間：{studyMinutes} 分</span>
          </div>
        </div>

        <label className="mb-1 block text-xs font-bold text-slate-500">今日の結果（やったこと）</label>
        <textarea
          value={done}
          onChange={(e) => setDone(e.target.value)}
          placeholder="例：単語帳を12ページ進めて、ミニテストで満点を取った！"
          rows={3}
          maxLength={140}
          autoFocus
          className="mb-4 w-full resize-none rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100"
        />

        <div className="flex gap-2">
          <button onClick={onCancel} className="flex-1 rounded-xl border border-slate-300 py-2.5 text-sm font-bold text-slate-600 transition hover:bg-slate-50">
            戻る
          </button>
          <button
            onClick={() => done.trim() && onSave(done.trim())}
            disabled={!done.trim()}
            className="flex-[2] rounded-xl bg-emerald-500 py-2.5 text-sm font-bold text-white transition hover:bg-emerald-600 disabled:opacity-40"
          >
            記録して退出する
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   アプリ本体
   ============================================================ */
function App() {
  const [users, setUsers] = useState(() => loadDB(DB_USERS, seedUsers, migrateUsers));
  const [logs, setLogs] = useState(() => loadDB(DB_LOGS, () => migrateLogs(seedLogs()), migrateLogs));
  const [currentName, setCurrentName] = useState(() => localStorage.getItem(DB_CURRENT) || null);
  const [now, setNow] = useState(Date.now());

  /* シーン演出用（表示だけの状態・保存しない） */
  const [mockComments, setMockComments] = useState({});
  const [reactions, setReactions] = useState({});
  const [selected, setSelected] = useState(null);
  const [showCheckIn, setShowCheckIn] = useState(false);
  const [showCheckout, setShowCheckout] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  /* タイマー刻み */
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);

  /* 別タブでの変更を反映（マルチユーザー模擬） */
  useEffect(() => {
    const onStorage = (e) => {
      if (e.key === DB_USERS && e.newValue) setUsers(JSON.parse(e.newValue));
      if (e.key === DB_LOGS && e.newValue) setLogs(JSON.parse(e.newValue));
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  const updateUsers = useCallback((updater) => {
    setUsers(prev => {
      const next = updater(prev);
      saveDB(DB_USERS, next);
      return next;
    });
  }, []);

  const me = users.find(u => u.username === currentName) || null;
  const dispName = useCallback(
    (username) => {
      const u = users.find(x => x.username === username);
      return (u && u.displayName) || username;
    },
    [users]
  );

  /* ログイン済みなのにオフライン状態（旧データなど）ならラウンジに入れる */
  useEffect(() => {
    if (me && me.status === 'offline') {
      updateUsers(prev => prev.map(u => u.username === currentName
        ? { ...u, isOnline: true, status: 'lounge' }
        : u));
    }
  }, [me && me.status, currentName]);

  /* モックユーザーがときどきつぶやきを変える（表示のみ・歩き回りはしない） */
  const loungeKey = users
    .filter(u => u.isOnline && (u.status === 'lounge' || u.status === 'resting'))
    .map(u => u.username).sort().join(',');

  useEffect(() => {
    const t = setInterval(() => {
      const names = (loungeKey ? loungeKey.split(',') : []).filter(n => MOCK_PHRASES[n] && n !== currentName);
      if (names.length === 0) return;
      const n = names[Math.floor(Math.random() * names.length)];
      const phrases = MOCK_PHRASES[n];
      setMockComments(prev => ({ ...prev, [n]: phrases[Math.floor(Math.random() * phrases.length)] }));
    }, 20000);
    return () => clearInterval(t);
  }, [loungeKey, currentName]);

  const showToast = (msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  };

  /* ---- ログイン（既存・プリセット） ---- */
  const handleLogin = (name) => {
    updateUsers(prev => {
      const exists = prev.some(u => u.username === name);
      if (exists) {
        return prev.map(u => (u.username === name && u.status === 'offline')
          ? { ...u, isOnline: true, status: 'lounge' }
          : u);
      }
      const preset = PRESET_USERS.find(p => p.username === name);
      return [...prev, {
        username: name,
        displayName: name,
        avatar: preset ? preset.avatar : avatarFor(name),
        bio: preset ? preset.bio : '新メンバー',
        plan: preset ? 'invited' : 'standard',
        isOnline: true, status: 'lounge', genre: '', currentTodo: '', comment: '', floor: 1,
        pos: randLoungePoint(),
        sessionStartTime: null, restStartedAt: null, totalRestMs: 0,
      }];
    });
    localStorage.setItem(DB_CURRENT, name);
    setCurrentName(name);
    setSelected(null);
  };

  /* ---- 新規登録（ID・表示名・招待コード） ---- */
  const handleRegister = (username, displayName, plan) => {
    updateUsers(prev => [...prev, {
      username, displayName,
      avatar: avatarFor(username),
      bio: '新メンバー',
      plan,
      isOnline: true, status: 'lounge', genre: '', currentTodo: '', comment: '', floor: 1,
      pos: randLoungePoint(),
      sessionStartTime: null, restStartedAt: null, totalRestMs: 0,
    }]);
    localStorage.setItem(DB_CURRENT, username);
    setCurrentName(username);
    if (plan === 'invited') {
      showToast('🎟️ 招待コードが適用されました！無料でご利用いただけます');
    } else {
      showToast('ようこそ！' + displayName + ' さん 🎉');
    }
  };

  const handleLogout = () => {
    /* アバターはオフィスに残す（他のユーザーから見える世界を維持） */
    localStorage.removeItem(DB_CURRENT);
    setCurrentName(null);
    setSelected(null);
  };

  /* ---- 表示名変更 / ひとこと ---- */
  const handleSetDisplayName = (text) => {
    updateUsers(prev => prev.map(u => u.username === currentName ? { ...u, displayName: text } : u));
  };
  const handleSetComment = (text) => {
    updateUsers(prev => prev.map(u => u.username === currentName ? { ...u, comment: text } : u));
  };

  /* ---- 自分のアバターをドラッグで移動 ---- */
  const handleMoveMe = (x, y) => {
    updateUsers(prev => prev.map(u => u.username === currentName ? { ...u, pos: { x, y } } : u));
  };

  /* ---- エレベーターでフロア移動（4Fは会員限定） ---- */
  const handleMoveFloor = (f) => {
    if (f === (me.floor || 2)) return;
    if (me.status === 'studying') {
      showToast('🔥 集中モード中はフロア移動できません（休憩してから移動してね）');
      return;
    }
    if (FLOOR_INFO[f].memberOnly && me.plan !== 'invited') {
      showToast('🔒 4F メンバーズバーは会員限定フロアです（招待コードで解放されます）');
      return;
    }
    updateUsers(prev => prev.map(u => u.username === currentName ? { ...u, floor: f } : u));
    showToast(FLOOR_INFO[f].icon + ' ' + f + 'F ' + FLOOR_INFO[f].label + ' に移動しました');
  };

  /* ---- チェックイン（集中スペース入室） ---- */
  const handleCheckIn = (genre, todo) => {
    setShowCheckIn(false);
    updateUsers(prev => prev.map(u => u.username === currentName
      ? { ...u, isOnline: true, status: 'studying', genre, currentTodo: todo,
          sessionStartTime: nowIso(), restStartedAt: null, totalRestMs: 0 }
      : u));
  };

  /* ---- 休憩（カフェへ） / 再開（集中スペースへ） ---- */
  const handleRest = () => {
    updateUsers(prev => prev.map(u => u.username === currentName
      ? { ...u, status: 'resting', restStartedAt: nowIso() }
      : u));
  };
  const handleResume = () => {
    updateUsers(prev => prev.map(u => {
      if (u.username !== currentName) return u;
      const restMs = u.restStartedAt ? Date.now() - new Date(u.restStartedAt).getTime() : 0;
      return { ...u, status: 'studying', restStartedAt: null, totalRestMs: (u.totalRestMs || 0) + restMs };
    }));
  };

  /* ---- 退出（記録あり）→ カフェに戻る ---- */
  const handleCheckout = (done, minutes) => {
    const newLog = {
      id: 'log-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      username: me.username,
      avatar: me.avatar,
      date: nowIso(),
      genre: me.genre,
      todo: me.currentTodo,
      done,
      actualStudyTimeMinutes: minutes,
    };
    setLogs(prev => {
      const next = [newLog, ...prev];
      saveDB(DB_LOGS, next);
      return next;
    });
    setShowCheckout(false);
    updateUsers(prev => prev.map(u => u.username === currentName
      ? { ...u, status: 'lounge', genre: '', currentTodo: '',
          sessionStartTime: null, restStartedAt: null, totalRestMs: 0 }
      : u));
  };

  /* ---- セッション消去 → カフェに戻る ---- */
  const handleDiscard = () => {
    updateUsers(prev => prev.map(u => u.username === currentName
      ? { ...u, status: 'lounge', genre: '', currentTodo: '',
          sessionStartTime: null, restStartedAt: null, totalRestMs: 0 }
      : u));
  };

  /* ---- タイムラインへのいいねスタンプ（トグル式） ---- */
  const handleReact = (logId, stamp) => {
    setLogs(prev => {
      const next = prev.map(l => {
        if (l.id !== logId) return l;
        const reactions = { ...(l.reactions || {}) };
        const who = reactions[stamp] || [];
        if (who.includes(currentName)) {
          const rest = who.filter(n => n !== currentName);
          if (rest.length === 0) delete reactions[stamp];
          else reactions[stamp] = rest;
        } else {
          reactions[stamp] = [...who, currentName];
        }
        return { ...l, reactions };
      });
      saveDB(DB_LOGS, next);
      return next;
    });
  };

  /* ---- アバタークリック ---- */
  const handleAvatarClick = (user, inFocus) => {
    if (user.username !== currentName && me && me.status === 'studying') {
      showToast('🔥 集中モード中は話しかけられません（休憩すると交流できます）');
      return;
    }
    if (inFocus && user.username !== currentName) {
      showToast('🤫 ' + dispName(user.username) + ' さんは集中モード中。話しかけられません');
      return;
    }
    setSelected(user.username);
  };

  const handleWave = (target) => {
    setReactions(prev => ({ ...prev, [target]: '👋 ' + dispName(currentName) + 'が手をふった！' }));
    setTimeout(() => {
      setReactions(prev => {
        const next = { ...prev };
        delete next[target];
        return next;
      });
    }, 3000);
    setSelected(null);
  };

  /* ---- 画面分岐 ---- */
  if (!me) {
    return (
      <React.Fragment>
        <LoginScreen users={users} onLogin={handleLogin} onRegister={handleRegister} />
        {toast && (
          <div className="fixed inset-x-4 top-16 z-50 mx-auto max-w-sm animate-popIn rounded-2xl bg-slate-800/95 px-4 py-3 text-center text-sm font-bold text-white shadow-xl">
            {toast}
          </div>
        )}
      </React.Fragment>
    );
  }

  /* 表示用の吹き出し：リアクション > モックのつぶやき > 本人のひとこと */
  const bubbles = {};
  for (const u of users) {
    bubbles[u.username] = reactions[u.username]
      || (u.username !== currentName ? mockComments[u.username] : null)
      || u.comment
      || null;
  }

  const selectedUser = selected ? users.find(u => u.username === selected) : null;
  const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <div className="min-h-screen bg-gradient-to-b from-amber-50/60 to-slate-100">
      <Header me={me} users={users} onSwitch={handleLogin} onLogout={handleLogout} />

      <main className="mx-auto max-w-5xl px-4 py-6">
        {/* オフィスシーン */}
        <OfficeScene
          users={users}
          me={me}
          bubbles={bubbles}
          dispName={dispName}
          autoNight={(() => { const h = new Date(now).getHours(); return h >= 18 || h < 6; })()}
          onAvatarClick={handleAvatarClick}
          onEnterFocus={() => (me.status === 'resting' ? handleResume() : setShowCheckIn(true))}
          onMoveMe={handleMoveMe}
          onMoveFloor={handleMoveFloor}
        />
        <p className="mt-2 text-center text-[11px] text-slate-400">
          🖱 自分のアイコンはドラッグで好きな場所へ移動できます ／ 他の人のアイコンをクリックすると話しかけられます（集中スペースの人は不可）
        </p>

        {/* 操作パネル & タイムライン */}
        <div className="mt-6 grid gap-6 lg:grid-cols-5">
          <div className="lg:col-span-2">
            <MyPanel
              me={me}
              now={now}
              onSetComment={handleSetComment}
              onSetDisplayName={handleSetDisplayName}
              onEnterFocus={() => setShowCheckIn(true)}
              onResume={handleResume}
              onRest={handleRest}
              onOpenCheckout={() => setShowCheckout(true)}
              onDiscard={handleDiscard}
            />
          </div>
          <section className="lg:col-span-3">
            {me.status === 'studying' ? (
              /* 集中モード中はタイムライン非表示 */
              <div className="flex h-full min-h-[160px] items-center justify-center rounded-3xl border border-dashed border-slate-300 bg-white/60 p-8 text-center">
                <p className="text-sm leading-relaxed text-slate-400">
                  🤫 集中モード中はタイムラインをお休みしています<br />
                  <span className="text-xs">退出（または休憩）するとまた見られます</span>
                </p>
              </div>
            ) : (
              <React.Fragment>
                <h2 className="mb-3 flex items-center gap-2 text-lg font-bold text-slate-800">🏆 みんなの成果タイムライン</h2>
                <div className="space-y-3">
                  {sortedLogs.length === 0 && (
                    <p className="rounded-2xl border border-dashed border-slate-300 bg-white p-6 text-center text-sm text-slate-400">
                      まだログがありません
                    </p>
                  )}
                  {sortedLogs.map(log => (
                    <TimelineItem key={log.id} log={log} name={dispName(log.username)} me={me} onReact={handleReact} dispName={dispName} />
                  ))}
                </div>
              </React.Fragment>
            )}
          </section>
        </div>
      </main>

      {/* モーダル・ポップオーバー・トースト */}
      {showCheckIn && (
        <CheckInModal onCheckIn={handleCheckIn} onCancel={() => setShowCheckIn(false)} />
      )}
      {showCheckout && (me.status === 'resting' || me.status === 'studying') && (
        <CheckoutModal
          me={me}
          studyMinutes={Math.max(1, Math.round(elapsedMs(me, now) / 60000))}
          onSave={(done) => handleCheckout(done, Math.max(1, Math.round(elapsedMs(me, now) / 60000)))}
          onCancel={() => setShowCheckout(false)}
        />
      )}
      {selectedUser && (
        <ProfilePopover
          user={selectedUser}
          now={now}
          isMe={selectedUser.username === currentName}
          onWave={() => handleWave(selectedUser.username)}
          onClose={() => setSelected(null)}
        />
      )}
      {toast && (
        <div className="fixed inset-x-4 top-16 z-50 mx-auto max-w-sm animate-popIn rounded-2xl bg-slate-800/95 px-4 py-3 text-center text-sm font-bold text-white shadow-xl">
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
